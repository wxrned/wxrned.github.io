name: Build and Minify

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run build
        run: npm run build
        
      - name: Commit minified files
        run: |
          git config user.name "wxrned"
          git config user.email "wxrned.lol@gmail.com"
          git add assets/js/min/ assets/css/min/
          git commit -m "Build: minify assets" || echo "No changes to commit"
          git push